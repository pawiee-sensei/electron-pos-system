<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS System</title>
<link rel="stylesheet" href="pos.css">
</head>

<body>

<div class="app-layout">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">POS electron</div>

        <button onclick="showView('pos')">POS</button>

        <button onclick="showView('checkout')">
            Checkout
        </button>

    </div>

    <!-- MAIN CONTENT -->

    <div class="main-content">

        <!-- POS VIEW -->

        <div id="view-pos" class="view">

            <div class="pos-header">

                <input 
                    id="searchInput"
                    placeholder="Search product..."
                >

            </div>

            <div class="category-tabs" id="categoryTabs">
                <!-- categories will render here -->
            </div>

            <div id="productGrid" class="product-grid"></div>

        </div>

        <!-- CHECKOUT VIEW -->

        <div id="view-checkout" class="view hidden">

            <h2>Payment Methods</h2>

            <div class="payment-options">

                <button>Cash</button>
                <button>Card</button>
                <button>Split</button>

            </div>

        </div>

    </div>

    <!-- CART PANEL -->

    <div class="cart-panel">

        <h2>Current Order</h2>

        <div id="cartItems"></div>

        <div class="cart-total">
            TOTAL ₱0
        </div>

        <button id="checkoutBtn">
            Continue
        </button>

    </div>

</div>

<script src="pos.js"></script>

</body>
</html>
