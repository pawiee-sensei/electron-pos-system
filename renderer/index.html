<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POS System</title>
<link rel="stylesheet" href="pos.css">
<link rel="stylesheet" href="checkout.css">
</head>

<body>

<div class="app-layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="logo">POS electron</div>

        <button onclick="showView('pos')">POS</button>
        <button onclick="showView('checkout')">Checkout</button>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- POS VIEW -->
        <div id="view-pos" class="view">

            <div class="pos-header">
                <input id="searchInput" placeholder="Search product...">
            </div>

            <div class="category-tabs" id="categoryTabs"></div>

            <div id="productGrid" class="product-grid"></div>

        </div>

        <!-- CHECKOUT VIEW -->
        <div id="view-checkout" class="view hidden">

            <h2>Payment Method</h2>

            <div class="payment-options">

                <div id="pay-cash" class="payment-option" onclick="selectPayment('cash')">
                    <div class="payment-icon">💵</div>
                    <div class="payment-label">Cash</div>
                </div>

                <div id="pay-card" class="payment-option" onclick="selectPayment('card')">
                    <div class="payment-icon">💳</div>
                    <div class="payment-label">Card</div>
                </div>

                <div id="pay-gcash" class="payment-option" onclick="selectPayment('gcash')">
                    <div class="payment-icon">📱</div>
                    <div class="payment-label">GCash</div>
                </div>

            </div>

            <div class="amount-due">

                <div class="due-label">
                    Amount Due
                </div>

                <div class="due-total" id="checkoutTotal">
                    ₱0
                </div>

            </div>

            <div id="cashSection" class="cash-section">

                <input
                    id="cashInput"
                    placeholder="Enter cash"
                    oninput="calculateChange()"
                />

                <!-- QUICK CASH BUTTONS -->

                <div class="quick-cash">

                    <button onclick="quickCash(100)">₱100</button>
                    <button onclick="quickCash(200)">₱200</button>
                    <button onclick="quickCash(500)">₱500</button>
                    <button onclick="quickCash(1000)">₱1000</button>

                </div>

                <div id="changeDisplay">
                    Change: ₱0
                </div>

            </div>



            <button class="complete-sale-btn" onclick="processCheckout()">
                Complete Sale
            </button>

        </div>

    </div> <!-- END main-content -->


    <!-- CART PANEL -->
    <div class="cart-panel">

        <h3>Current Order</h3>

        <div id="cartItems"></div>

        <div class="cart-summary">

            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotalAmount">₱0</span>
            </div>

        </div>

        <div class="total-row">
            <span>Total</span>
            <span class="total-amount" id="totalAmount">₱0</span>
        </div>

        <button class="checkout-btn" id="checkoutBtn">
            Checkout
        </button>

    </div>

</div> <!-- END app-layout -->

<div id="posAlert"></div>  

<script src="cart.js"></script>
<script src="ui.js"></script>
<script src="pos.js"></script>
<script src="checkout.js"></script>

</body>
</html>
